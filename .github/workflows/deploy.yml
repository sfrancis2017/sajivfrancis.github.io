name: Deploy site to GitHub Pages

on:
  # Triggers on push to master (the cutover branch)
  push:
    branches: [master]
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Scheduled rebuild every 6 hours so /news re-fetches the worker
  # at build time. Without this the static page would be frozen at
  # last-deploy time. Edge cache on the worker keeps the rebuild
  # cheap (1 cache-warm hit per run, not 11 fresh feed fetches).
  schedule:
    - cron: '0 */6 * * *'

# Set permissions for GITHUB_TOKEN to allow Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in between.
# In-progress runs are not cancelled.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (Astro + Pagefind index)
        run: npm run build
        env:
          # Make build deterministic in CI
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
